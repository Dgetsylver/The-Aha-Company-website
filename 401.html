/* JavaScript | Page Theme Change */
document.addEventListener("colorThemesReady", () => {
  $("[data-animate-theme-to]").each(function () {
    let theme = $(this).attr("data-animate-theme-to");
    let brand = $(this).attr("data-animate-brand-to");
    ScrollTrigger.create({
      trigger: $(this),
      start: "top center",
      end: "bottom center",
      onToggle: ({ self, isActive }) => {
        if (isActive) gsap.to("body", { ...colorThemes.getTheme(theme, brand) });
      }
    });
  });
});

  <script>
/* ---------- JavaScript | Global ---------- */
// --- Initialize All Scripts on DOMContentLoaded ---
document.addEventListener('DOMContentLoaded', () => {
  initSideNavigationWipeEffect();
  initNavScrollBehavior();
});
/* ----- Lenis Scroll ----- */
// Lenis
const lenis = new Lenis({
  autoRaf: true,
});
/* ----- GSAP Animation ----- */
/* Split Text */
document.addEventListener("DOMContentLoaded", () => {
	if (typeof window.gsap === "undefined") document.documentElement.classList.add("gsap-not-found");
	gsap.registerPlugin(ScrollTrigger, SplitText);
});
// Chars Animation
document.fonts.ready.then(() => {
  // Function to handle the animation for any element
  function animateCharacters(element) {
    // Split the text by lines and characters
    const split = new SplitText(element, {
      type: "words, chars",
      charsClass: "gsap-char",
      wordsClass: "gsap-word"
    });
    // Wrap each line in a mask container
    split.lines.forEach((line) => {
      const mask = document.createElement("div");
      mask.classList.add("gsap-line-mask");
      line.parentNode.insertBefore(mask, line);
      mask.appendChild(line);
    });
    // Create a GSAP timeline with a ScrollTrigger
    gsap.timeline({
      scrollTrigger: {
        trigger: element,
        start: "top bottom",
        end: "top 90%",
        toggleActions: "none play none none",
      },
    })
    .from(split.chars, {
      yPercent: 110,          // animate from below
      duration: 0.4,
      stagger: { amount: 0.2 },
    });
  }
  // Target single elements with the 'data-chars-reveal' attribute
  document.querySelectorAll("[data-chars-reveal='true']").forEach((text) => {
    gsap.set(text, { autoAlpha: 1 }); // prevent flicker
    animateCharacters(text);
  });
  // Target containers with the 'data-chars-children-reveal' attribute
  document.querySelectorAll("[data-chars-children-reveal='true']").forEach((container) => {
    const children = container.children;
    for (const child of children) {
      animateCharacters(child);
    }
    gsap.set(container, { autoAlpha: 1 }); // prevent flicker
  });
});
// Element Reveal Animation
document.querySelectorAll("[data-element-reveal='true']").forEach((element) => {
  gsap.timeline({
    scrollTrigger: {
      trigger: element,
      start: "top bottom",
      end: "top 90%",
      toggleActions: "play none none none",
    },
  })
  .from(element, {
    opacity: 0,
    yPercent: 10,
    duration: 0.8,
    ease: "power2.out"
  });
});
// Line Reveal Animation
$("[section-line-animation]").each(function () {
  let triggerElement = $(this)[0];
  let targetElement = $(this)[0];
  let tl = gsap.timeline({
    scrollTrigger: {
      trigger: triggerElement,
      start: "top 90%",
      toggleActions: "play none none none",
    }
  });
  tl.fromTo(targetElement,
    {width: "0%"},
    {width: "100%", duration: 1, ease: "power2.out"}
  );
});
/* ----- Nav ----- */
function initCenteredScalingNavigationBar() {
  const navigationInnerItems = document.querySelectorAll("[data-navigation-item]")
  // Apply CSS transition delay
  navigationInnerItems.forEach((item, index)=> {
      item.style.transitionDelay = `${index * 0.05}s`;
  });
  // Toggle Navigation
  document.querySelectorAll('[data-navigation-toggle="toggle"]').forEach(toggleBtn => {
    toggleBtn.addEventListener('click', () => {
      const navStatusEl = document.querySelector('[data-navigation-status]');
      if (!navStatusEl) return;
      if (navStatusEl.getAttribute('data-navigation-status') === 'not-active') {
        navStatusEl.setAttribute('data-navigation-status', 'active');
        // If you use Lenis you can 'stop' Lenis here: Example Lenis.stop();
      } else {
        navStatusEl.setAttribute('data-navigation-status', 'not-active');
        // If you use Lenis you can 'start' Lenis here: Example Lenis.start();
      }
    });
  });
  // Close Navigation
  document.querySelectorAll('[data-navigation-toggle="close"]').forEach(closeBtn => {
    closeBtn.addEventListener('click', () => {
      const navStatusEl = document.querySelector('[data-navigation-status]');
      if (!navStatusEl) return;
      navStatusEl.setAttribute('data-navigation-status', 'not-active');
      // If you use Lenis you can 'start' Lenis here: Example Lenis.start();
    });
  });
  // Key ESC - Close Navigation
  document.addEventListener('keydown', e => {
    if (e.keyCode === 27) {
      const navStatusEl = document.querySelector('[data-navigation-status]');
      if (!navStatusEl) return;
      if (navStatusEl.getAttribute('data-navigation-status') === 'active') {
        navStatusEl.setAttribute('data-navigation-status', 'not-active');
       // If you use Lenis you can 'start' Lenis here: Example Lenis.start();
      }
    }
  });
}
// Initialize Centered Scaling Navigation Bar
document.addEventListener('DOMContentLoaded', function() {
  initCenteredScalingNavigationBar();
});
</script>
